---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'JETLS.jl tag to build (defaults to UPSTREAM_VERSION)'
        required: false
        type: string
      force:
        description: 'Rebuild even if the asset already exists'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - UPSTREAM_VERSION

# Least privilege by default. Only the publish job is granted write,
# and that job never executes untrusted upstream code.
permissions:
  contents: read

jobs:
  # The build job runs untrusted upstream code (clone + Julia precompile
  # + create_sysimage) and smoke-tests the result. It holds only a
  # read-only token, used solely by the pre-build decide step, and never
  # runs a token-bearing step after the upstream code. The only thing it
  # hands forward is the sysimage zip, carried as an artifact to the
  # separate publish job, so upstream code cannot reach the write token
  # or tamper with the scripts the publish job runs on its own runner.
  build:
    name: Build ${{ matrix.tag }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            tag: linux-x64
            shim: bin/jetls
          - runner: macos-latest
            tag: macos-arm64
            shim: bin/jetls
          - runner: windows-latest
            tag: win-x64
            shim: bin/jetls.cmd
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          # Keep the token out of .git/config so upstream code cannot
          # pick it up during the sysimage build.
          persist-credentials: false

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Install zip (Windows)
        if: matrix.tag == 'win-x64'
        shell: pwsh
        run: choco install zip -y --no-progress

      - name: Resolve version and decide whether to build
        id: decide
        # Runs before any upstream code, on a pristine checkout. The
        # read-only token is used only here and is not persisted.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/decide.sh

      - name: Build sysimage
        # Executes untrusted upstream code. No token in this environment,
        # and no token-bearing step runs after it in this job, so upstream
        # code has no token-holding step to hijack.
        if: steps.decide.outputs.proceed == 'true'
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/build.sh

      - name: Smoke test the built sysimage
        # Runs the freshly built upstream shim + sysimage. No token in
        # this job, so executing upstream code here is safe, and testing
        # the artifact before publishing gates a broken build.
        if: steps.decide.outputs.proceed == 'true'
        env:
          ASSET: ${{ steps.decide.outputs.asset }}
          SHIM: ${{ matrix.shim }}
        run: |
          set -eu
          rm -rf .smoke && mkdir .smoke
          unzip -q "build/$ASSET" -d .smoke
          ./.smoke/"$SHIM" --version

      - name: Upload sysimage artifact
        if: steps.decide.outputs.proceed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sysimage-${{ matrix.tag }}
          path: build/${{ steps.decide.outputs.asset }}
          if-no-files-found: error
          retention-days: 1

  # The publish job holds the write token and never executes upstream
  # code: a fresh checkout plus a downloaded artifact, then `gh` via
  # publish.sh. It runs independently per platform — `if: !cancelled()`
  # decouples it from a sibling platform's build failure, and it
  # re-derives the same decision as the build job so a missing artifact
  # for a platform that was supposed to build hard-fails instead of
  # being mistaken for an intentional skip.
  publish:
    name: Publish ${{ matrix.tag }}
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        tag: [linux-x64, macos-arm64, win-x64]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Resolve version and decide whether to publish
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/decide.sh

      - name: Download sysimage artifact
        # No continue-on-error: when decide says this asset must be
        # produced, a missing artifact is a real failure (e.g. the build
        # broke), not an intentional skip, and must surface.
        if: steps.decide.outputs.proceed == 'true'
        uses: actions/download-artifact@v8
        with:
          name: sysimage-${{ matrix.tag }}
          path: build

      - name: Publish release
        # GH_TOKEN is present, but this job never executed upstream code,
        # and the build job's untrusted code ran on a different runner, so
        # it cannot have tampered with this script.
        if: steps.decide.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.decide.outputs.version }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/publish.sh
