---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'JETLS.jl tag to build (defaults to UPSTREAM_VERSION)'
        required: false
        type: string
      force:
        description: 'Rebuild even if the asset already exists'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - UPSTREAM_VERSION

# Least privilege by default. Only the publish job is granted write,
# and that job never executes untrusted upstream code.
permissions:
  contents: read

jobs:
  # The build job runs untrusted upstream code (clone + Julia precompile
  # + create_sysimage). It is kept on its own runner with a read-only
  # token, and it never runs a write-capable or token-bearing step after
  # the upstream code. The only thing it hands forward is the sysimage
  # zip, carried as an artifact to the separate publish job. This is the
  # trust boundary: upstream code cannot reach the publish token because
  # publishing happens on a different runner with a fresh checkout.
  build:
    name: Build ${{ matrix.tag }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            tag: linux-x64
          - runner: macos-latest
            tag: macos-arm64
          - runner: windows-latest
            tag: win-x64
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          # Keep the token out of .git/config so upstream code cannot
          # pick it up during the sysimage build.
          persist-credentials: false

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Install zip (Windows)
        if: matrix.tag == 'win-x64'
        shell: pwsh
        run: choco install zip -y --no-progress

      - name: Resolve version and decide whether to build
        id: decide
        # Runs before any upstream code, on a pristine checkout. The
        # read-only token is used only here and is not persisted.
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: |
          set -eu
          VERSION=${VERSION_INPUT:-$(tr -d '[:space:]' < UPSTREAM_VERSION)}
          if [[ ! "$VERSION" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "invalid VERSION '$VERSION' (expected YYYY-MM-DD)" >&2
            exit 1
          fi
          ASSET="jetls-sysimage-${VERSION}-${PLATFORM_TAG}.zip"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          if [[ "$FORCE" != "true" ]] && \
             gh release view "$VERSION" --json assets --jq '.assets[].name' 2>/dev/null \
             | grep -qx "$ASSET"; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "asset $ASSET already exists; build will be skipped"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sysimage
        # Executes untrusted upstream code. No token in this environment,
        # and no token-bearing step runs after it in this job, so upstream
        # code has no token-holding step to hijack.
        if: steps.decide.outputs.build == 'true'
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/build.sh

      - name: Upload sysimage artifact
        if: steps.decide.outputs.build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sysimage-${{ matrix.tag }}
          path: build/${{ steps.decide.outputs.asset }}
          if-no-files-found: error
          retention-days: 1

  # The publish job holds the write token. It does a fresh checkout on a
  # separate runner and only ever runs `gh` (publish.sh) plus a no-token
  # smoke test, so the untrusted build-job code cannot have tampered with
  # the scripts it executes here.
  publish:
    name: Publish ${{ matrix.tag }}
    needs: build
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            tag: linux-x64
            shim: bin/jetls
          - runner: macos-latest
            tag: macos-arm64
            shim: bin/jetls
          - runner: windows-latest
            tag: win-x64
            shim: bin/jetls.cmd
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Resolve version
        id: resolve
        # No token needed; reads UPSTREAM_VERSION from the fresh checkout.
        env:
          VERSION_INPUT: ${{ inputs.version }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: |
          set -eu
          VERSION=${VERSION_INPUT:-$(tr -d '[:space:]' < UPSTREAM_VERSION)}
          if [[ ! "$VERSION" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "invalid VERSION '$VERSION' (expected YYYY-MM-DD)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=jetls-sysimage-${VERSION}-${PLATFORM_TAG}.zip" >> "$GITHUB_OUTPUT"

      - name: Download sysimage artifact
        id: dl
        # Fails softly when the matching build was skipped (asset already
        # existed): publish and smoke are then guarded off below.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sysimage-${{ matrix.tag }}
          path: build

      - name: Publish release
        # GH_TOKEN is present, but this job never executed upstream code:
        # fresh checkout + a downloaded artifact, and publish.sh only
        # calls `gh`. The build job's untrusted code ran on a different
        # runner and cannot have tampered with this script.
        if: steps.dl.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.resolve.outputs.version }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/publish.sh

      - name: Smoke test the built artifact
        # Executes the upstream-built shim + sysimage. No token in this
        # environment and no token-bearing step runs afterward.
        if: steps.dl.outcome == 'success'
        env:
          ASSET: ${{ steps.resolve.outputs.asset }}
          SHIM: ${{ matrix.shim }}
        run: |
          set -eu
          rm -rf .smoke && mkdir .smoke
          unzip -q "build/$ASSET" -d .smoke
          ./.smoke/"$SHIM" --version
