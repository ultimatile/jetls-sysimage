---
name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.tag }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            tag: linux-x64
          - runner: macos-latest
            tag: macos-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Build and upload sysimage
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ./scripts/release.sh -f
          else
            ./scripts/release.sh
          fi

      - name: Smoke test the published asset
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: |
          set -eu
          VERSION=$(gh release view --repo aviatesk/JETLS.jl --json tagName -q .tagName)
          ASSET="jetls-sysimage-${VERSION}-${PLATFORM_TAG}.zip"
          TMP=$(mktemp -d)
          gh release download "$VERSION" --pattern "$ASSET" --dir "$TMP"
          (cd "$TMP" && unzip -q "$ASSET")
          "$TMP/bin/jetls" --version
