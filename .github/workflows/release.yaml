---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'JETLS.jl tag to build (defaults to UPSTREAM_VERSION)'
        required: false
        type: string
      force:
        description: 'Rebuild even if the asset already exists'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - UPSTREAM_VERSION

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.tag }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            tag: linux-x64
          - runner: macos-latest
            tag: macos-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Build and upload sysimage
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM_TAG: ${{ matrix.tag }}
          VERSION: ${{ inputs.version }}
        run: |
          if [[ "${{ inputs.force }}" == "true" ]]; then
            ./scripts/release.sh -f
          else
            ./scripts/release.sh
          fi

      - name: Smoke test the published asset
        env:
          GH_TOKEN: ${{ github.token }}
          PLATFORM_TAG: ${{ matrix.tag }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -eu
          VERSION=${VERSION_INPUT:-$(tr -d '[:space:]' < UPSTREAM_VERSION)}
          ASSET="jetls-sysimage-${VERSION}-${PLATFORM_TAG}.zip"
          TMP=$(mktemp -d)
          gh release download "$VERSION" --pattern "$ASSET" --dir "$TMP"
          (cd "$TMP" && unzip -q "$ASSET")
          "$TMP/bin/jetls" --version
