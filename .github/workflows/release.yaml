---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'JETLS.jl tag to build (defaults to UPSTREAM_VERSION)'
        required: false
        type: string
      force:
        description: 'Rebuild even if the asset already exists'
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - UPSTREAM_VERSION

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ matrix.tag }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            tag: linux-x64
            shim: bin/jetls
          - runner: macos-latest
            tag: macos-arm64
            shim: bin/jetls
          - runner: windows-latest
            tag: win-x64
            shim: bin/jetls.cmd
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          # Avoid leaving a push-capable token in .git/config that
          # untrusted upstream code (precompile hooks, build scripts)
          # could pick up during the sysimage build.
          persist-credentials: false

      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'

      - name: Install zip (Windows)
        if: matrix.tag == 'win-x64'
        shell: pwsh
        run: choco install zip -y --no-progress

      - name: Resolve version and decide whether to build
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: |
          set -eu
          VERSION=${VERSION_INPUT:-$(tr -d '[:space:]' < UPSTREAM_VERSION)}
          if [[ ! "$VERSION" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "invalid VERSION '$VERSION' (expected YYYY-MM-DD)" >&2
            exit 1
          fi
          ASSET="jetls-sysimage-${VERSION}-${PLATFORM_TAG}.zip"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
          if [[ "$FORCE" != "true" ]] && \
             gh release view "$VERSION" --json assets --jq '.assets[].name' 2>/dev/null \
             | grep -qx "$ASSET"; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "asset $ASSET already exists; build will be skipped"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sysimage
        # No GH_TOKEN: this step clones JETLS.jl and runs Julia
        # precompile + create_sysimage, which executes upstream code.
        if: steps.decide.outputs.build == 'true'
        env:
          VERSION: ${{ steps.decide.outputs.version }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/build.sh

      - name: Publish release
        if: steps.decide.outputs.build == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.decide.outputs.version }}
          PLATFORM_TAG: ${{ matrix.tag }}
        run: ./scripts/publish.sh

      - name: Download published asset
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.decide.outputs.version }}
          ASSET: ${{ steps.decide.outputs.asset }}
        run: |
          set -eu
          rm -rf .smoke && mkdir .smoke
          gh release download "$VERSION" --pattern "$ASSET" --dir .smoke
          (cd .smoke && unzip -q "$ASSET")

      - name: Smoke test the published asset
        # No GH_TOKEN: this step executes the just-downloaded shim and
        # sysimage, which originate from upstream code.
        env:
          SHIM: ${{ matrix.shim }}
        run: |
          ./.smoke/"$SHIM" --version
